<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Chiếu Ảnh FullHD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            height: 100%;
            max-height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide.active { opacity: 1; }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.4);
            color: white;
            font-size: 3rem;
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            user-select: none;
            transition: background-color 0.3s, scale 0.2s;
            z-index: 10;
        }
        .arrow:hover { background-color: rgba(0,0,0,0.8); scale: 1.05; }
        .arrow:active { scale: 0.95; }
        .prev { left: 30px; }
        .next { right: 30px; }
        .dots-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        .dot {
            width: 15px;
            height: 15px;
            background-color: rgba(255,255,255,0.4);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .dot.active { background-color: #fff; transform: scale(1.2); }
        .day-label {
            position: absolute;
            top: 20px;
            right: 30px;
            background-color: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1rem;
            padding: 6px 16px;
            border-radius: 6px;
            z-index: 10;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="slider-container">
    <button class="arrow prev" onclick="changeSlide(-1)">&#10094;</button>

    <div class="slide active">
        <img src="/hopca/menu.png" alt="Menu">
    </div>
    <div class="slide">
        <img id="day-img-1" src="" alt="Ảnh ngày 1">
    </div>
    <div class="slide">
        <img id="day-img-2" src="" alt="Ảnh ngày 2">
    </div>

    <button class="arrow next" onclick="changeSlide(1)">&#10095;</button>

    <div class="dots-container">
        <div class="dot active" onclick="currentSlide(0)"></div>
        <div class="dot" onclick="currentSlide(1)"></div>
        <div class="dot" onclick="currentSlide(2)"></div>
    </div>

    <div class="day-label" id="day-label"></div>
</div>

<script>
    const dayMap = {
        0: { file: 'sunday',    label: 'Chủ Nhật'  },
        1: { file: 'monday',    label: 'Thứ Hai'   },
        2: { file: 'tuesday',   label: 'Thứ Ba'    },
        3: { file: 'wednesday', label: 'Thứ Tư'    },
        4: { file: 'thursday',  label: 'Thứ Năm'   },
        5: { file: 'friday',    label: 'Thứ Sáu'   },
        6: { file: 'saturday',  label: 'Thứ Bảy'   }
    };

    const today = new Date().getDay();
    const dayInfo = dayMap[today];

    document.getElementById('day-img-1').src = '/hopca/' + dayInfo.file + '1.png';
    document.getElementById('day-img-2').src = '/hopca/' + dayInfo.file + '2.png';
    document.getElementById('day-label').textContent = dayInfo.label;

    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');

    function showSlide(index) {
        if (index >= slides.length) currentIndex = 0;
        else if (index < 0) currentIndex = slides.length - 1;
        else currentIndex = index;

        slides.forEach(s => s.classList.remove('active'));
        dots.forEach(d => d.classList.remove('active'));

        slides[currentIndex].classList.add('active');
        dots[currentIndex].classList.add('active');
    }

    function changeSlide(n) { showSlide(currentIndex + n); }
    function currentSlide(n) { showSlide(n); }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft') changeSlide(-1);
        else if (e.key === 'ArrowRight') changeSlide(1);
    });
</script>
</body>
</html>
