name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -f "https://antoan-msi.io.vn/deploy.php?token=msi-deploy-2026-secret" \
            --max-time 120 \
            --retry 2 \
            -s -o deploy_output.txt -w "\nHTTP Status: %{http_code}\n"
          cat deploy_output.txt
